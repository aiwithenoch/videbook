<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>How to Make Your Own AI Influencer</title>
    <meta name="description" content="Buy How to Make Your Own AI Influencer for $5." />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(223, 79, 47, 0.18), transparent 34%),
          #f8f3e8;
        color: #151515;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .site {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .nav {
        width: min(1080px, calc(100% - 36px));
        min-height: 72px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 16px;
      }

      .nav-buy,
      .buy {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: #df4f2f;
        color: #ffffff;
        font-weight: 900;
        box-shadow: 0 14px 28px rgba(223, 79, 47, 0.22);
      }

      .nav-buy {
        padding: 0 16px;
      }

      .hero {
        width: min(1080px, calc(100% - 36px));
        min-height: calc(100vh - 72px);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(260px, 0.78fr) minmax(0, 1fr);
        align-items: center;
        gap: 42px;
        padding: 22px 0 56px;
      }

      .cover {
        width: min(360px, 100%);
        max-height: min(72vh, 650px);
        display: block;
        margin: 0 auto;
        border-radius: 8px;
        object-fit: contain;
        box-shadow: 0 24px 55px rgba(27, 23, 16, 0.24);
      }

      .copy {
        display: grid;
        gap: 18px;
      }

      .tag {
        width: fit-content;
        padding: 8px 12px;
        border: 1px solid #e0c9a0;
        border-radius: 8px;
        background: #fffaf0;
        color: #9b3a24;
        font-size: 0.78rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        max-width: 650px;
        margin: 0;
        font-size: clamp(2.4rem, 7vw, 4.8rem);
        line-height: 0.97;
        letter-spacing: 0;
      }

      p {
        max-width: 560px;
        margin: 0;
        color: #49443c;
        font-size: 1.08rem;
        line-height: 1.58;
      }

      .points {
        display: grid;
        gap: 9px;
        max-width: 560px;
        margin: 0;
        padding: 0;
        list-style: none;
        color: #2f2b26;
      }

      .points li {
        padding: 12px 14px;
        border: 1px solid #ddd1bd;
        border-radius: 8px;
        background: #fffaf0;
        font-weight: 800;
      }

      .price {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
      }

      .price strong {
        font-size: 3.4rem;
        line-height: 1;
      }

      .price span {
        color: #6d665b;
        font-weight: 800;
      }

      .buy {
        width: min(360px, 100%);
        min-height: 60px;
        font-size: 1.15rem;
      }

      @media (max-width: 820px) {
        body {
          background:
            radial-gradient(circle at top, rgba(223, 79, 47, 0.18), transparent 38%),
            #f8f3e8;
        }

        .nav {
          width: min(100% - 28px, 1080px);
          min-height: 64px;
        }

        .nav-buy {
          min-height: 42px;
          width: 122px;
        }

        .hero {
          width: min(100% - 28px, 1080px);
          min-height: auto;
          grid-template-columns: 1fr;
          gap: 20px;
          padding: 8px 0 34px;
        }

        .cover {
          width: min(300px, 100%);
          max-height: 52vh;
        }

        .copy {
          text-align: center;
          justify-items: center;
        }

        .points {
          width: 100%;
          text-align: left;
        }

        .price {
          justify-content: center;
        }

        h1 {
          font-size: clamp(2.15rem, 11vw, 3.1rem);
        }

        p {
          font-size: 1rem;
        }

        .buy {
          width: 100%;
        }
      }

      @media (max-width: 420px) {
        .cover {
          width: min(250px, 100%);
          max-height: 46vh;
        }

        .copy {
          gap: 14px;
        }

        .points li {
          padding: 11px 12px;
        }

        .price strong {
          font-size: 3rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="site">

            <li>Pick a profitable niche</li>
            <li>Create your AI character</li>
            <li>Make content people want</li>
            <li>Start selling digital products</li>
          </ul>

          <div class="price">
            <strong>$5</strong>
            <span>Instant ebook access</span>
          </div>

          <a class="buy" href="https://checkout.dodopayments.com/buy/pdt_0NeL3ORM65BRYicGU0em4?quantity=1">Buy Now for $5</a>
        </div>
      </section>
    </main>
  </body>
</html>
